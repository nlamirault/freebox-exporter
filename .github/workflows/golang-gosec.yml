name: Golang / Security

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  golang-security-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - uses: ynniss/golang-security-action@master
        with:
          CODE_PATH: "."
